server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Ignora logs de favicon e robots para deixar o servidor mais rápido
    location = /favicon.ico { log_not_found off; access_log off; }
    location = /robots.txt  { log_not_found off; access_log off; }

   # Redireciona as chamadas da API do Frontend para o container do Bot
    location /api/ {
        # 👇 DNS interno do Docker: ensina o Nginx a procurar o bot sem crashar
        resolver 127.0.0.11 valid=30s;
        set $upstream_bot http://bot-anna-trufas:3001;
        
        proxy_pass $upstream_bot;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }